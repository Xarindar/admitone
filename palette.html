<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Color Palette Studio | Admit One</title>
    <meta
      name="description"
      content="Build a brand color palette in seconds. Pick a primary color, lock what you like, and generate fresh matching options around it."
    />
    <link rel="icon" href="assets/logos/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Fraunces:opsz,wght@9..144,500..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/tokens.css?v=marquee-bulbs" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/palette.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to palette</a>

    <div class="palette-page">
      <header class="palette-bar">
        <a class="back-link" href="resources.html">
          <span class="back-arrow" aria-hidden="true">&larr;</span>
          Back to resources
        </a>
        <a class="bar-brand" href="index.html" aria-label="Admit One home">
          <img src="assets/logos/logo-wordmark.svg" alt="Admit One" />
        </a>
      </header>

      <main class="palette-stage" id="main">
        <div class="palette-row" id="paletteRow" aria-label="Color palette"></div>
      </main>

      <div class="palette-toolbar">
        <div class="toolbar-group">
          <button class="button button-gold" id="generateBtn" type="button">Generate</button>
          <label class="brand-pick">
            <span class="brand-pick-label">Brand color</span>
            <input type="color" id="brandColor" value="#2f8f5b" />
          </label>
        </div>

        <div class="toolbar-cue" aria-hidden="true">
          <span class="toolbar-hint toolbar-hint-desktop"><kbd>Space</kbd> to generate</span>
        </div>

        <div class="toolbar-group is-end">
          <button class="button button-dark copy-desktop" id="copyAllBtn" type="button">Copy palette</button>
          <button class="button button-dark copy-desktop" id="shareBtn" type="button">Copy link</button>
          <div class="copy-menu" id="copyMenu">
            <button
              class="copy-menu-toggle"
              id="copyMenuToggle"
              type="button"
              aria-label="Copy options"
              aria-expanded="false"
              aria-haspopup="menu"
              aria-controls="copyMenuPanel"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M9 2a2 2 0 0 0-2 2v1H6a3 3 0 0 0-3 3v11a3 3 0 0 0 3 3h8a3 3 0 0 0 3-3v-1h1a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H9Zm0 2h10v11h-2V8a3 3 0 0 0-3-3H9V4ZM6 7h8a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1Z"
                />
              </svg>
            </button>
            <div class="copy-menu-panel" id="copyMenuPanel" role="menu" hidden>
              <button type="button" id="copyLinkMobileBtn" role="menuitem">Copy link</button>
              <button type="button" id="copyPaletteMobileBtn" role="menuitem">Copy palette</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="palette-toast" id="paletteToast" role="status" aria-live="polite"></div>

    <script src="js/color-names.js?v=1"></script>
    <script src="js/palette.js?v=9"></script>
  </body>
</html>
